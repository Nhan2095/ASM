<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>dang nhap</title>

    <meta name="author" content="Untree.co">


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="site-wrap d-md-flex align-items-stretch">
        <div class="bg-img" style="background-image: url('images/img-bg-1.jpg')"></div>
        <div class="form-wrap">
            <div class="form-inner">
                <h1 class="title">Login</h1>
                <a href="../index.html">Quay lại trang chủ</a>
                <p class="caption mb-4">Hãy điền thông tin của bạn để tiến hành đăng nhập.</p>

                <form action="#" class="pt-3">
                    <div class="form-floating">
                        <input required type="email" class="form-control" id="email" placeholder="info@example.com">
                        <label for="email">Địa chỉ Email</label>
                    </div>

                    <div class="form-floating">
                        <span class="password-show-toggle js-password-show-toggle"><span class="uil"></span></span>
                        <input required type="password" class="form-control" id="password" placeholder="Password">
                        <label for="password">Mật khẩu</label>
                    </div>

                    <div class="d-flex justify-content-between">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label for="remember" class="form-check-label">Giữ tôi đăng nhập</label>
                        </div>
                        <div><a href="#">Quên mật khẩu?</a></div>
                    </div>
                    
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary">Đăng nhập</button>
                    </div>

                    <div class="mb-2">Chưa có tài khoản? <a href="signup.html">Đăng ký</a></div>

                    <div class="social-account-wrap">
                        <h4 class="mb-4"><span>hoặc tiếp tục với</span></h4>
                        <ul class="list-unstyled social-account d-flex justify-content-between">
                            <li><a href="#"><img src="images/icon-google.svg" alt="Google logo"></a></li>
                            <li><a href="#"><img src="images/icon-facebook.svg" alt="Facebook logo"></a></li>
                            <li><a href="#"><img src="images/icon-apple.svg" alt="Apple logo"></a></li>
                            
                        </ul>
                    </div>

                </form>
            </div>
        </div>
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="js/custom.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <script>
        // Lưu trữ thông tin người dùng
        document.getElementById("save-button").addEventListener("click", function() {
          var email = document.getElementById("email").value;
          var password = document.getElementById("password").value;
          localStorage.setItem("email", email);
          localStorage.setItem("password", password);
        });
    
        // Đọc thông tin người dùng
        document.addEventListener("DOMContentLoaded", function() {
          var email = localStorage.getItem("email");
          var password = localStorage.getItem("password");
          document.getElementById("email").value = email;
          document.getElementById("password").value = password;
        });

      </script>
    </body>
</html>
